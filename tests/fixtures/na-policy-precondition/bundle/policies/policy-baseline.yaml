id: policy.baseline
version: 1
purpose: A Compliant requirement plus one NotApplicable by PolicyPrecondition (applies only to public repositories).
requirements:
  - id: req.secret-scanning
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
  - id: req.public-only
    applicability:
      reason: PolicyPrecondition
      when:
        equals:
          attribute: visibility
          value: public
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
