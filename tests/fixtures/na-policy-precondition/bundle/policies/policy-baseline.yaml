id: policy.baseline
version: 1
purpose: >-
  A Compliant requirement plus one NotApplicable by PolicyPrecondition (applies only to public
  repositories). The NotApplicable requirement's predicate would be NonCompliant if it were
  evaluated (it requires secret_scanning=disabled, but the repo has it enabled) — so its
  NotApplicability, not a would-be-pass, is what keeps the policy Compliant.
requirements:
  - id: req.secret-scanning
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
  - id: req.public-only
    applicability:
      reason: PolicyPrecondition
      when:
        equals:
          attribute: visibility
          value: public
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: disabled
