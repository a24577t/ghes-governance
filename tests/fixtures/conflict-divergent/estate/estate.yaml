enterprise: acme
ghes_version: "3.13"
organizations:
  - octo-org
repositories:
  # Both authoritative Observe bindings definitely apply (organization and repository name
  # each match) but carry divergent policy versions — a proven authority conflict across
  # divergent requirement sets for (policy.baseline, octo-org/service-g).
  - id: octo-org/service-g
    organization: octo-org
    name: service-g
    archived: false
    fork: false
    ghes_version: "3.13"
    settings:
      secret_scanning: enabled     # R1 → Compliant under both versions
      dependency_review: enabled   # R2 (v1 only) → Compliant
      branch_protection: disabled  # R3 (v2 only) → NonCompliant
