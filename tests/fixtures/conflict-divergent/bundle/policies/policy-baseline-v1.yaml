id: policy.baseline
version: 1
purpose: Baseline security controls — version 1 requirement set {R1, R2}.
requirements:
  # R1 — shared with version 2.
  - id: req.secret-scanning
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
  # R2 — only in version 1.
  - id: req.dependency-review
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: dependency_review
        value: enabled
