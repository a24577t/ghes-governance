id: policy.baseline
version: 1
purpose: A requirement declaring the dormant NotApplicable reason PlatformCapabilityUnavailable — not author-declarable in this slice.
requirements:
  - id: req.dormant-reason
    applicability:
      reason: PlatformCapabilityUnavailable
      when:
        equals:
          attribute: fork
          value: true
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
