id: policy.baseline
version: 1
purpose: One registered requirement alongside an unregistered-strategy requirement (AC 6).
requirements:
  - id: req.secret-scanning
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
  - id: req.unknown-strategy
    strategy:
      identifier: NoSuchStrategy
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
