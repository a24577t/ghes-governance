id: policy.baseline
version: 1
purpose: A Compliant requirement plus one NotApplicable by RepositoryCharacteristic (applies only to forks).
requirements:
  - id: req.secret-scanning
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
  - id: req.fork-only
    applicability:
      reason: RepositoryCharacteristic
      when:
        equals:
          attribute: fork
          value: true
    strategy:
      identifier: PredicateEvaluation
      version: 1
    predicate:
      equals:
        setting: secret_scanning
        value: enabled
