evaluation_role: Authoritative
enforcement_mode: Observe
effective_start: "2025-01-01T00:00:00Z"
effective_end: "2027-01-01T00:00:00Z"
# `not` (logical negation) over a single scope condition. The negated operand is Cannot
# Determine (visibility undeterminable → Unknown), and not(Unknown) is Unknown: negation
# cannot resolve an undeterminable operand.
scope:
  not:
    equals:
      attribute: visibility
      value: private
