policy: policy.baseline
policy_version: 1
evaluation_role: Authoritative
enforcement_mode: Observe
effective_start: "2025-01-01T00:00:00Z"
effective_end: "2027-01-01T00:00:00Z"
# `all` (logical AND) over two scope conditions: the first operand is determined FALSE
# (organization == other-org, present-but-different → NotApplicable), the second is Cannot
# Determine (visibility undeterminable → Unknown). A determined-FALSE operand forces `all`
# to NotApplicable regardless of the Unknown.
scope:
  all:
    - equals:
        attribute: organization
        value: other-org
    - equals:
        attribute: visibility
        value: private
